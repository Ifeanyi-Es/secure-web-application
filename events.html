    <div class="d-flex align-items-center">
      <a class="navbar-brand brand me-3 text-primary fw-bold" href="index.html">Lancashire Medicare</a>

      <!-- profile & settings on the right -->
  <div id="signedInUser" class="d-none d-md-flex align-items-center text-muted small">
  Signed in as <strong id="signedName" class="ms-1"></strong>
</div>

      <div class="dropdown">
        <button class="btn btn-light btn-sm d-flex align-items-center gap-2" id="accountMenu" data-bs-toggle="dropdown" aria-expanded="false">
          <img id="signedAvatar" class="userProfilePic rounded-circle" width="34" height="34" alt="User Avatar" src="">
          <i class="bi bi-caret-down-fill ms-1 d-none d-md-inline"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="Profile_page.html"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
          <li><hr class="dropdown-divider"></li>
          <li> <a class="dropdown-item logoutBtn" href="#"> <i class="bi bi-box-arrow-right me-2"></i>Sign out </a></li>
        </ul>
      </div>
    </div>
  </header>
     
 <!-- Main Content -->
    <main class="container-fluid flex-grow-1">
        <div class="row h-100 d-flex justify-content-center">
  
       <aside class="col-md-2 bg-light p-3 h-100 border-end" id="sidebar"> <!--  side bar starts here -->
         <div class="d-flex flex-column flex-shrink-1 bg-light h-100 ">
        <ul class="nav  flex-column mb-auto " >
        <br>
      
        <button onclick="history.back()" class="btn btn-primary"> &larr; Go Back </button>

      </ul>
   </div>
    </aside> <!-- sidebar end here-->

   <main class="col-md-10  ms-sm-auto px-4 ">

  <!-- Calendar container -->
  <div id="calendar"></div>

  <!-- Add Event Modal -->
  <div class="modal fade" id="eventModal" tabindex="-1" aria-labelledby="eventModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="eventForm">
          <div class="modal-header">
            <h5 class="modal-title" id="eventModalLabel">Add Event</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="eventTitle" class="form-label">Event Title</label>
              <input type="text" class="form-control" id="eventTitle" required>
            </div>
            <div class="mb-3">
              <label for="eventDate" class="form-label">Date</label>
              <input type="date" class="form-control" id="eventDate" required>
            </div>
            <div class="mb-3">
              <label for="eventColor" class="form-label">Color</label>
              <input type="color" class="form-control form-control-color" id="eventColor" value="#3788d8">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-success">Add Event</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>


</main>


</div>
</main>
