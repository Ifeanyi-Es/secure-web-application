<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings</title>

    <!-- CSS (single Bootstrap version) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    
</head>
<body class="min-vh-100 d-flex flex-column bg-light">
     <nav class="navbar navbar-expand-lg navbar-light bg-light  p-2 m-0 w-100">
        <div class="container-fluid">
            <a class="navbar-brand text-primary fw-bold" href="index.html">Lancashire Medicare</a>
        </div>
  </nav>

    <!-- top brand -->
   
    <div class="container-fluid flex-grow-1">
        <div class="row g-0 min-vh-100 align-items-stretch">

            <!-- Sidebar -->
              <aside class="col-md-2 bg-light p-3 h-100 border-end" id="sidebar"> <!--  side bar starts here -->
         <div class="d-flex flex-column  bg-light h-100 ">
<br>
            
        <button onclick="history.back()" class="btn btn-primary"> &larr; Go Back </button>
    
      </div>
   
    </aside> <!-- sidebar end here-->

            <!-- Main -->
            <main class="col-md-10 p-4 overflow-auto">
                <div class="container">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="mb-0">General Settings</h2>
                        
                    </div>

                    <div class="row g-4">
                        <div class="col-12 col-lg-8">
                            <form id="settingsForm" class="card p-3 shadow-sm" method="post" novalidate>
                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label for="defaultTimezone" class="form-label">Default timezone</label>
                                        <select id="defaultTimezone" name="timezone" class="form-select" required>
                                            <option value="UTC">UTC</option>
                                            <option value="Europe/London" selected>Europe/London</option>
                                            <option value="America/New_York">America/New_York</option>
                                            <option value="Asia/Kolkata">Asia/Hong kong</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="language" class="form-label">Language</label>
                                        <select id="language" name="language" class="form-select">
                                            <option value="en" selected>English</option>
                
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="dateFormat" class="form-label">Date format</label>
                                        <select id="dateFormat" name="dateFormat" class="form-select">
                                            <option value="d/m/Y">DD/MM/YYYY</option>
                                            <option value="m/d/Y">MM/DD/YYYY</option>
                                            <option value="Y-m-d" selected>YYYY-MM-DD</option>
                                        </select>
                                    </div>

                                    <div class="col-md-4">
                                        <label class="form-label d-block"> Device Registration</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="allowRegistration" checked>
                                            <label class="form-check-label text-muted" for="allowRegistration">Allow device registration</label>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label d-block">Notifications</label>
                                        <div class="row g-2">
                                            <div class="col-md-4">
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" id="emailNotif" type="checkbox" checked>
                                                    <label class="form-check-label" for="emailNotif">Email notifications</label>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" id="smsNotif" type="checkbox">
                                                    <label class="form-check-label" for="smsNotif">SMS notifications</label>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" id="pushNotif" type="checkbox">
                                                    <label class="form-check-label" for="pushNotif">Push notifications</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-12 d-flex justify-content-end gap-2 mt-2">
                                        <button type="reset" class="btn btn-outline-secondary">Reset</button>
                                        <button type="submit" class="btn btn-primary">Save settings</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        
                    </div><!-- /.row -->
                </div><!-- /.container -->
            </main>

        </div><!-- /.row -->
    </div><!-- /.container-fluid -->

    <footer class="bd-footer py-3 bg-dark text-center text-light mt-auto">
        &copy; 2025 Lancashire Medicare
    </footer>

    <!-- JS: jQuery then single Bootstrap bundle, then local scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
